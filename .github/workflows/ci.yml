name: CTS Self-Test

# Differential harness self-test: with no Parallax plugin, std::execution::seq and
# std::execution::par both run on the CPU, so every non-gap case must pass. This
# validates the harness and the test kernels on every push — no GPU required.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  selftest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { cc: gcc,   cxx: g++ }
          - { cc: clang, cxx: clang++ }
    name: selftest-${{ matrix.compiler.cxx }}
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libtbb-dev ${{ matrix.compiler.cc }}

      - name: Configure
        env:
          CC: ${{ matrix.compiler.cc }}
          CXX: ${{ matrix.compiler.cxx }}
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure
